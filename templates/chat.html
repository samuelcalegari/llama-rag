<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Assistant</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <style>
        .chat-box {
            height: 600px;
            overflow-y: scroll;
        }

        .chat-message {
            margin-bottom: 10px;
        }

        .message-received {
            text-align: left;
        }

        .message-sent {
            text-align: right;
        }

        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #d80258;
            color: #d80258;
            box-shadow: 9999px 0 0 -5px;
            animation: dot-pulse 1.5s infinite linear;
            animation-delay: 0.25s;
            margin-left: 20px;
        }

        .dot-pulse::before, .dot-pulse::after {
            content: "";
            display: inline-block;
            position: absolute;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #d80258;
            color: #d80258;
        }

        .dot-pulse::before {
            box-shadow: 9984px 0 0 -5px;
            animation: dot-pulse-before 1.5s infinite linear;
            animation-delay: 0s;
        }

        .dot-pulse::after {
            box-shadow: 10014px 0 0 -5px;
            animation: dot-pulse-after 1.5s infinite linear;
            animation-delay: 0.5s;
        }

        @keyframes dot-pulse-before {
            0% {
                box-shadow: 9984px 0 0 -5px;
            }
            30% {
                box-shadow: 9984px 0 0 2px;
            }
            60%, 100% {
                box-shadow: 9984px 0 0 -5px;
            }
        }

        @keyframes dot-pulse {
            0% {
                box-shadow: 9999px 0 0 -5px;
            }
            30% {
                box-shadow: 9999px 0 0 2px;
            }
            60%, 100% {
                box-shadow: 9999px 0 0 -5px;
            }
        }

        @keyframes dot-pulse-after {
            0% {
                box-shadow: 10014px 0 0 -5px;
            }
            30% {
                box-shadow: 10014px 0 0 2px;
            }
            60%, 100% {
                box-shadow: 10014px 0 0 -5px;
            }
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <h2 class="text-center mb-4">Help Assistant</h2>
            <div class="chat-box border p-3 mb-3">
                <!-- Messages go here -->
                <div class="chat-message message-received">
                    <p class="bg-light p-2 rounded d-inline-block w-auto">Bonjour en quoi puis-je t'aider ?</p>
                </div>
            </div>
            <form id="chat-form">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Tapez votre message..." id="message-input">
                    <button class="btn btn-primary" type="submit">Envoyer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS and jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
        crossorigin="anonymous"></script>
<script>
    function addDots() {
        const chatBox = document.querySelector('.chat-box');
        const newMessage = document.createElement('div');
        newMessage.className = 'chat-message message-received';
        newMessage.innerHTML = `<div class="dot-pulse"></div>`;
        chatBox.appendChild(newMessage);
        // Scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    function addMessage(message, type) {
        const chatBox = document.querySelector('.chat-box');
        const newMessage = document.createElement('div');
        newMessage.className = 'chat-message ' + type;
        newMessage.innerHTML = `<p class="bg-${type === 'message-sent' ? 'primary' : 'light'} ${type === 'message-sent' ? 'text-white' : 'text-black'} p-2 rounded d-inline-block w-auto">${message}</p>`;
        chatBox.appendChild(newMessage);
        // Clear the input
        document.getElementById('message-input').value = '';
        // Scroll to bottom
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // JavaScript pour gérer l'envoi de messages
    document.getElementById('chat-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var message = document.getElementById('message-input').value;
        if (message.trim() !== '') {
            // Add the message to the chat box
            addMessage(message, 'message-sent');
            // call the API to send the message
            addDots();
            fetch('http://localhost:8080/query', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    query: message
                })
            })
                .then(response => {
                    return response.blob();
                })
                .then(blob => {
                    let reader = new FileReader();
                    reader.readAsText(blob);
                    reader.onloadend = function () {
                        let response = JSON.parse(reader.result);
                        // remove the dots
                        document.querySelector('.dot-pulse').remove();
                        // Add the response to the chat box
                        addMessage(response.message, 'message-received');
                    }
                })
        }
    });
</script>
</body>
</html>
